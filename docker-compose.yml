services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: todo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: ./todo-backend
      dockerfile: Dockerfile
    container_name: todo-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres:5432/todo_db
      JWT_SECRET: your_super_secret_jwt_key_2024_todo_app
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./todo-frontend
      dockerfile: Dockerfile
    container_name: todo-app
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: todo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # Cloudflare Tunnel Service - Points to Nginx (handles both frontend + API)
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: todo-tunnel
    restart: always
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
      - nginx

volumes:
  postgres_data:
    driver: local
